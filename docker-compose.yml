name: arisha-payments

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: arisha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payments}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payments}
      POSTGRES_DB: ${POSTGRES_DB:-payments}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-payments} -d ${POSTGRES_DB:-payments}
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    logging: *default-logging

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: arisha-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging: *default-logging

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: arisha-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import httpx, sys; sys.exit(0 if httpx.get('http://localhost:8000/health', timeout=2).status_code == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  consumer:
    build:
      context: .
      dockerfile: Dockerfile
      target: consumer
    container_name: arisha-consumer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os; os.kill(1, 0)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  outbox-relay:
    build:
      context: .
      dockerfile: Dockerfile
      target: outbox-relay
    container_name: arisha-outbox-relay
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import os; os.kill(1, 0)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging

  webhook-receiver:
    build:
      context: .
      dockerfile: Dockerfile
      target: webhook-receiver
    container_name: arisha-webhook-receiver
    restart: unless-stopped
    environment:
      WEBHOOK_RECEIVER_HOST: 0.0.0.0
      WEBHOOK_RECEIVER_PORT: 9000
    ports:
      - "${WEBHOOK_RECEIVER_PORT:-9000}:9000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import httpx, sys; sys.exit(0 if httpx.get('http://localhost:9000/health', timeout=2).status_code == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

volumes:
  postgres_data:
    name: arisha-postgres-data
  rabbitmq_data:
    name: arisha-rabbitmq-data

networks:
  default:
    name: arisha-net
